<div class="super-search-widget" ng-class="{'super-search-widget--compact': c.data.config.compactMode}">
  <form class="super-search-widget__form" ng-submit="c.submitSearch()" novalidate>
    <div class="super-search-widget__top-row" ng-if="::!c.data.config.compactMode">
      <h2 class="super-search-widget__greeting" ng-if="::c.data.greetingName">
        Hei {{::c.data.greetingName}}, hva leter du etter?
      </h2>
      <h2 class="super-search-widget__greeting" ng-if="::!c.data.greetingName">
        Hei, hva leter du etter?
      </h2>

    </div>

    <div class="super-search-widget__surface">
      <div class="super-search-widget__controls">
        <div class="super-search-widget__input-wrap">
          <div class="super-search-widget__placeholder" ng-if="c.placeholder.isVisible" aria-hidden="true">
            <span class="super-search-widget__placeholder-text">{{c.placeholder.typedText}}</span>
            <span class="super-search-widget__placeholder-caret"></span>
          </div>
          <input
            id="super-search-input"
            class="form-control super-search-widget__input"
            type="search"
            ng-model="c.searchTerm"
            ng-change="c.onSearchTermChange()"
            ng-focus="c.onInputFocus()"
            ng-blur="c.onInputBlur()"
            aria-label="Sok"
            placeholder=""
            autocomplete="off" />
          <button class="btn btn-primary super-search-widget__button" type="submit" aria-label="{{::c.data.config.buttonLabel}}">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="M10.5 4a6.5 6.5 0 1 0 4.03 11.6l4.43 4.44 1.06-1.06-4.44-4.43A6.5 6.5 0 0 0 10.5 4zm0 1.5A5 5 0 1 1 5.5 10.5a5 5 0 0 1 5-5z"></path>
            </svg>
            <span class="super-search-widget__button-text">{{::c.data.config.buttonLabel}}</span>
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
